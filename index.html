<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Find the Hidden Animal!</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    height: 100%;
    background: linear-gradient(to bottom, #A8E6CF, #DCEDC8);
    touch-action: none;
    font-family: 'Comic Sans MS', 'Trebuchet MS', sans-serif;
    user-select: none;
  }
  #gameArea {
    position: relative;
    width: 100%;
    height: 100%;
  }
  /* Decorative scenery, purely visual, non-interactive */
  .deco {
    position: absolute;
    font-size: 70px;
    opacity: 0.85;
    pointer-events: none;
  }
  .hideSpot {
    position: absolute;
    font-size: 70px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 90px;
    height: 90px;
  }
  .leafCover {
    font-size: 70px;
    transition: transform 0.3s ease, opacity 0.3s ease;
  }
  .found .leafCover {
    transform: scale(0);
    opacity: 0;
  }
  .animalIcon {
    position: absolute;
    font-size: 70px;
    opacity: 0;
    transition: opacity 0.3s ease, transform 0.3s ease;
    transform: scale(0.5);
    pointer-events: none;
  }
  .found .animalIcon {
    opacity: 1;
    transform: scale(1.3);
  }
  #status {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 26px;
    color: #2E7D32;
    text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
    z-index: 10;
  }
  #title {
    position: absolute;
    top: 10px;
    width: 100%;
    text-align: center;
    font-size: 24px;
    color: #2E7D32;
    text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
    z-index: 5;
  }
  #cheer {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    font-size: 44px;
    font-weight: bold;
    color: #FF6B9D;
    text-shadow: 3px 3px 0 white, -1px -1px 0 white, 1px -1px 0 white, -1px 1px 0 white;
    z-index: 30;
    opacity: 0;
    pointer-events: none;
    transition: all 0.4s ease;
    text-align: center;
  }
  #cheer.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1.1);
  }
  .confetti {
    position: absolute;
    top: -20px;
    border-radius: 2px;
    animation: fall linear forwards;
    z-index: 20;
  }
  @keyframes fall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0.9; }
  }
  #nextBtn {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 22px;
    padding: 12px 28px;
    border-radius: 30px;
    border: none;
    background: #FFD166;
    color: #5C4400;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    cursor: pointer;
    z-index: 10;
    display: none;
  }
</style>
</head>
<body>

<div id="gameArea">
  <div id="title">рҹ”Қ Find the hidden animals!</div>
  <div id="status">Found: 0 / 4</div>
  <div id="cheer"></div>
  <button id="nextBtn">Next Scene в–¶</button>
</div>

<script>
const gameArea = document.getElementById('gameArea');
const statusEl = document.getElementById('status');
const cheerEl = document.getElementById('cheer');
const nextBtn = document.getElementById('nextBtn');

const decoEmojis = ['рҹҢі','рҹҢІ','вҳҒпёҸ','рҹҢё','рҹҚ„','рҹҢј','рҹҢҝ','рҹӘЁ'];
const animalSets = [
  ['рҹҗ¶','рҹҗұ','рҹҗ°','рҹҗ»'],
  ['рҹҰҠ','рҹҗё','рҹҗө','рҹҗј'],
  ['рҹҗ§','рҹҗў','рҹҰӢ','рҹҗқ'],
  ['рҹҗЁ','рҹҰҒ','рҹҗҜ','рҹҗ№']
];

let foundCount = 0;
let totalAnimals = 4;
let audioCtx;

const animalSounds = {
  'рҹҗ¶': 'Woof woof! Dog!',
  'рҹҗұ': 'Meow! Cat!',
  'рҹҗ°': 'Hop hop! Bunny!',
  'рҹҗ»': 'Grr! Bear!',
  'рҹҰҠ': 'Yip! Fox!',
  'рҹҗё': 'Croak croak! Frog!',
  'рҹҗө': 'Ooh ooh! Monkey!',
  'рҹҗј': 'Munch munch! Panda!',
  'рҹҗ§': 'Waddle waddle! Penguin!',
  'рҹҗў': 'Slow slow! Turtle!',
  'рҹҰӢ': 'Flutter flutter! Butterfly!',
  'рҹҗқ': 'Buzz buzz! Bee!',
  'рҹҗЁ': 'Yawn! Koala!',
  'рҹҰҒ': 'Roar! Lion!',
  'рҹҗҜ': 'Roar! Tiger!',
  'рҹҗ№': 'Squeak! Hamster!'
};

function ding(freq) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(freq, audioCtx.currentTime);
    g.gain.setValueAtTime(0.3, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
    o.connect(g);
    g.connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + 0.4);
  } catch (e) {}
}

function speak(text) {
  try {
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = 0.95;
    utter.pitch = 1.3;
    speechSynthesis.speak(utter);
  } catch (e) {}
}

function launchConfetti() {
  const confettiColors = ['#FF6B9D','#FFD166','#06D6A0','#4D96FF','#9D4EDD','#FF9F1C'];
  for (let i = 0; i < 50; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti';
    const size = 6 + Math.random() * 8;
    piece.style.width = size + 'px';
    piece.style.height = size + 'px';
    piece.style.left = Math.random() * window.innerWidth + 'px';
    piece.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
    const duration = 2 + Math.random() * 1.5;
    piece.style.animationDuration = duration + 's';
    gameArea.appendChild(piece);
    setTimeout(() => piece.remove(), duration * 1000 + 100);
  }
}

function showCheer(msg) {
  cheerEl.textContent = msg;
  cheerEl.classList.add('show');
  speak(msg);
  launchConfetti();
  setTimeout(() => cheerEl.classList.remove('show'), 1800);
}

function clearScene() {
  document.querySelectorAll('.deco, .hideSpot').forEach(el => el.remove());
  nextBtn.style.display = 'none';
}

function randomPos(size) {
  const margin = 60;
  const x = margin + Math.random() * (window.innerWidth - size - margin * 2);
  const y = 80 + Math.random() * (window.innerHeight - size - 150);
  return { x, y };
}

function buildScene() {
  clearScene();
  foundCount = 0;
  statusEl.textContent = 'Found: 0 / ' + totalAnimals;

  // Decorative background elements (non-interactive, just scenery)
  for (let i = 0; i < 14; i++) {
    const deco = document.createElement('div');
    deco.className = 'deco';
    deco.textContent = decoEmojis[Math.floor(Math.random() * decoEmojis.length)];
    const pos = randomPos(70);
    deco.style.left = pos.x + 'px';
    deco.style.top = pos.y + 'px';
    deco.style.fontSize = (40 + Math.random() * 40) + 'px';
    gameArea.appendChild(deco);
  }

  // Pick a random animal set for variety
  const animals = animalSets[Math.floor(Math.random() * animalSets.length)];

  animals.forEach((animal) => {
    const spot = document.createElement('div');
    spot.className = 'hideSpot';
    const pos = randomPos(90);
    spot.style.left = pos.x + 'px';
    spot.style.top = pos.y + 'px';

    const animalIcon = document.createElement('div');
    animalIcon.className = 'animalIcon';
    animalIcon.textContent = animal;
    animalIcon.style.left = '0px';
    animalIcon.style.top = '0px';

    const leafCover = document.createElement('div');
    leafCover.className = 'leafCover';
    leafCover.textContent = decoEmojis[Math.floor(Math.random() * decoEmojis.length)];

    spot.appendChild(animalIcon);
    spot.appendChild(leafCover);

    spot.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      if (spot.classList.contains('found')) return;
      spot.classList.add('found');
      foundCount++;
      statusEl.textContent = 'Found: ' + foundCount + ' / ' + totalAnimals;
      ding(500 + foundCount * 80);
      speak(animalSounds[animal] || 'You found it!');

      if (foundCount === totalAnimals) {
        setTimeout(() => {
          showCheer('Great job!! рҹҺү You found them all!');
          nextBtn.style.display = 'block';
        }, 400);
      }
    });

    gameArea.appendChild(spot);
  });
}

nextBtn.addEventListener('click', buildScene);

buildScene();
</script>

</body>
</html>
